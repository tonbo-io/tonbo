[package]
name = "tonbo"
version = "0.1.0"
edition = "2021"
resolver = "2"
license = "Apache-2.0"


[dependencies]
arrow = "55.2.0"
crossbeam-skiplist = "0.1.3"
fusio = "0.3.8"
futures-core = "0.3.31"
serde = { version = "1.0.219", features = ["derive"] }
smallvec = "2.0.0-alpha.11"
thiserror = "2.0.12"
tokio = { version = "1.42.0", features = ["rt", "sync"], optional = true }

[features]
default = ["tokio"]
tokio = ["dep:tokio"]
